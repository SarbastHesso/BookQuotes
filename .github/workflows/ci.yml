name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore and test backend
        run: |
          dotnet restore BookQuotes.sln
          dotnet build BookQuotes.sln --configuration Release --no-restore
          dotnet test BookQuotes.sln --configuration Release --no-build --verbosity normal

      # Optional: inject production secrets from GitHub Secrets into the job environment
      - name: Inject secrets from GitHub
        if: ${{ secrets.JWT_KEY != '' && secrets.POSTGRES_CONNECTION != '' }}
        run: |
          echo "Jwt__Key=${{ secrets.JWT_KEY }}" >> $GITHUB_ENV
          echo "ConnectionStrings__PostgresConnection=${{ secrets.POSTGRES_CONNECTION }}" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bookquotes-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: bookquotes-ui
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: bookquotes-ui
        run: npm run build -- --configuration=production

      - name: Run Cypress smoke test
        working-directory: bookquotes-ui
        run: |
          npx http-server ./dist/browser -p 8080 &
          npx cypress run --config baseUrl=http://127.0.0.1:8080,video=false --spec "cypress/e2e/**/*.cy.js"
