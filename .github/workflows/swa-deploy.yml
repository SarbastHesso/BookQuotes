name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: bookquotes-ui
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: bookquotes-ui
        run: npm run build --if-present

      - name: 'Deploy to Azure Static Web Apps'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LEMON_GRASS_069153203 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: "bookquotes-ui"
          output_location: "dist/bookquotes-ui/browser"
